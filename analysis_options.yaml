include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/firebase_options.dart"
  errors:
    # Suppress documentation requirements (solo dev, code is the docs)
    public_member_api_docs: ignore
    lines_longer_than_80_chars: ignore
    flutter_style_todos: ignore
    sort_pub_dependencies: ignore
    # Suppress strict-inference warnings (too noisy with Flutter widget trees)
    inference_failure_on_instance_creation: ignore
    inference_failure_on_function_invocation: ignore
    inference_failure_on_untyped_parameter: ignore
    strict_raw_type: ignore

linter:
  rules:
    # === SUPPRESSED: Style-only rules that would require massive refactor ===
    # These add no bug-catching value, just code style churn.
    omit_local_variable_types: false        # 98 hits — type annotations are fine
    sort_constructors_first: false           # 88 hits — constructor position is fine
    cascade_invocations: false               # 82 hits — cascades aren't always clearer
    always_use_package_imports: false         # 79 hits — relative imports are fine
    prefer_int_literals: false               # 45 hits — 1.0 vs 1 doesn't matter
    directives_ordering: false               # 38 hits — import order is fine
    # inference_failure_on_instance_creation handled in analyzer.errors above
    always_put_required_named_parameters_first: false  # 26 hits — parameter order
    document_ignores: false                  # 14 hits — ignore comments don't need docs
    avoid_escaping_inner_quotes: false        # 10 hits — style preference
    avoid_multiple_declarations_per_line: false  # 8 hits — style preference
    prefer_if_elements_to_conditional_expressions: false  # 6 hits — style preference
    prefer_single_quotes: false              # existing codebase uses double quotes
    avoid_redundant_argument_values: false    # noisy with Flutter widget constructors

    # === KEPT: Bug-catching rules worth having ===
    # unawaited_futures: true               # catches fire-and-forget futures (default ON)
    # avoid_catches_without_on_clauses: true # catches too-broad exception handling
    # prefer_const_constructors: true        # performance benefit in Flutter
    # prefer_const_literals_to_create_immutables: true

# DCM (Dart Code Metrics) — deeper static analysis
# Run with: dcm analyze lib
dart_code_metrics:
  rules:
    # Widget performance
    - avoid-returning-widgets
    - avoid-unnecessary-setstate

    # Dead / unused code
    - avoid-unused-parameters

    # Naming
    - prefer-correct-identifier-length:
        min-identifier-length: 2
        max-identifier-length: 40

    # Collection best practices
    - prefer-first
    - prefer-last

    # File/class naming consistency
    - prefer-match-file-name

    # Complexity & readability
    - avoid-nested-conditional-expressions
    - avoid-redundant-async
    - prefer-commenting-analyzer-ignores
    - prefer-conditional-expressions
    - prefer-moving-to-variable

    # Type safety
    - avoid-unnecessary-type-assertions
    - avoid-unnecessary-type-casts
    - avoid-unrelated-type-assertions

  metrics:
    cyclomatic-complexity: 20
    number-of-parameters: 6
    maximum-nesting-level: 5
    source-lines-of-code: 50

  anti-patterns:
    - long-method
    - long-parameter-list
