name: brush_quest
description: "A fun toothbrushing game for kids - defeat cavity monsters in space!"
publish_to: 'none'
version: 1.0.0+13

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.0
  google_fonts: ^6.2.1
  wakelock_plus: ^1.4.0
  camera: ^0.11.0+2
  permission_handler: ^12.0.1
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  google_sign_in: ^7.2.0
  firebase_crashlytics: ^5.0.7
  firebase_analytics: ^12.1.2
  lottie: ^3.3.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^7.0.0
  glados: ^1.1.1
  dart_code_linter: ^4.0.1

flutter:
  uses-material-design: true

  shaders:
    - assets/shaders/dissolve.frag
    - assets/shaders/shockwave.frag

  assets:
    - assets/images/
    - assets/images/heroes/
    - assets/images/monsters/
    - assets/audio/
    - assets/audio/voices/buddy/
    - assets/animations/
